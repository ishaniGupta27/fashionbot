name: Run Fashionbot

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Job id under remote jobs/"
        required: true
        type: string
      remote_root:
        description: "rclone remote root"
        required: true
        default: "gdrive:fashionbot"
        type: string
      execution_mode:
        description: "Use dry_run for plumbing tests, real for fal.ai generation"
        required: true
        default: "dry_run"
        type: choice
        options:
          - dry_run
          - real
      generate_metadata:
        description: "Generate YouTube Shorts metadata with OpenAI"
        required: true
        default: false
        type: boolean
      publish_youtube:
        description: "Upload the reel as a private YouTube Short"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: fashionbot-${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  run:
    name: Job ${{ inputs.job_id }} (${{ inputs.execution_mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      FASHIONBOT_REMOTE_ROOT: ${{ inputs.remote_root }}
      FASHIONBOT_JOB_ID: ${{ inputs.job_id }}
      FASHIONBOT_EXECUTION_MODE: ${{ inputs.execution_mode }}
      FASHIONBOT_GENERATE_METADATA: ${{ inputs.generate_metadata }}
      FASHIONBOT_PUBLISH_YOUTUBE: ${{ inputs.publish_youtube }}

    steps:
      - name: 01 Checkout repository
        uses: actions/checkout@v6

      - name: 02 Show run inputs
        run: |
          echo "Job id: ${FASHIONBOT_JOB_ID}"
          echo "Remote root: ${FASHIONBOT_REMOTE_ROOT}"
          echo "Execution mode: ${FASHIONBOT_EXECUTION_MODE}"
          echo "Generate metadata: ${FASHIONBOT_GENERATE_METADATA}"
          echo "Publish YouTube: ${FASHIONBOT_PUBLISH_YOUTUBE}"
          echo "Runner: ${RUNNER_OS}"
          echo "Workspace: ${GITHUB_WORKSPACE}"

      - name: 03 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: 04 Show Python version
        run: |
          python --version
          python -m pip --version

      - name: 05 Install ffmpeg, rclone, and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg rclone fonts-dejavu-core

      - name: 06 Show tool versions
        run: |
          ffmpeg -version
          rclone version

      - name: 07 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 08 Verify Fashionbot imports
        working-directory: code
        run: |
          python -m fashionbot.run --help

      - name: 09 Configure rclone from secret
        env:
          RCLONE_CONFIG_SECRET: ${{ secrets.RCLONE_CONFIG }}
        run: |
          if [ -z "${RCLONE_CONFIG_SECRET}" ]; then
            echo "Missing required GitHub secret: RCLONE_CONFIG"
            exit 1
          fi

          mkdir -p "${HOME}/.config/rclone"
          printf '%s' "${RCLONE_CONFIG_SECRET}" > "${HOME}/.config/rclone/rclone.conf"
          chmod 600 "${HOME}/.config/rclone/rclone.conf"
          echo "rclone config written"

      - name: 10 Verify fal.ai secret for real runs
        if: ${{ inputs.execution_mode == 'real' }}
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          if [ -z "${FAL_KEY}" ]; then
            echo "Missing required GitHub secret for real runs: FAL_KEY"
            exit 1
          fi
          echo "FAL_KEY is present"

      - name: 10b Verify OpenAI secret for metadata
        if: ${{ inputs.execution_mode == 'real' && inputs.generate_metadata }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing required GitHub secret for metadata: OPENAI_API_KEY"
            exit 1
          fi
          echo "OPENAI_API_KEY is present"

      - name: 10c Verify YouTube secrets for publish
        if: ${{ inputs.execution_mode == 'real' && inputs.publish_youtube }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          if [ -z "${YOUTUBE_CLIENT_ID}" ]; then
            echo "Missing required GitHub secret for publish: YOUTUBE_CLIENT_ID"
            exit 1
          fi
          if [ -z "${YOUTUBE_CLIENT_SECRET}" ]; then
            echo "Missing required GitHub secret for publish: YOUTUBE_CLIENT_SECRET"
            exit 1
          fi
          if [ -z "${YOUTUBE_REFRESH_TOKEN}" ]; then
            echo "Missing required GitHub secret for publish: YOUTUBE_REFRESH_TOKEN"
            exit 1
          fi
          echo "YouTube secrets are present"

      - name: 11 Check remote root
        run: |
          rclone lsd "${FASHIONBOT_REMOTE_ROOT}"

      - name: 12 Check remote assets folder
        run: |
          rclone lsf "${FASHIONBOT_REMOTE_ROOT}/assets" --max-depth 2

      - name: 13 Check remote archetypes folder
        run: |
          rclone lsf "${FASHIONBOT_REMOTE_ROOT}/archetypes" --max-depth 2

      - name: 14 Check remote job folder
        run: |
          rclone lsf "${FASHIONBOT_REMOTE_ROOT}/jobs/${FASHIONBOT_JOB_ID}" --max-depth 3

      - name: 15 Run Fashionbot remote dry-run
        if: ${{ inputs.execution_mode == 'dry_run' }}
        working-directory: code
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          python -m fashionbot.run "${FASHIONBOT_JOB_ID}" --remote --remote-root "${FASHIONBOT_REMOTE_ROOT}" --dry-run

      - name: 16 Run Fashionbot remote real job
        if: ${{ inputs.execution_mode == 'real' }}
        working-directory: code
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          python -m fashionbot.run "${FASHIONBOT_JOB_ID}" --remote --remote-root "${FASHIONBOT_REMOTE_ROOT}"

      - name: 17 Generate YouTube Shorts metadata
        if: ${{ inputs.execution_mode == 'real' && inputs.generate_metadata }}
        working-directory: code
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m fashionbot.metadata "${FASHIONBOT_JOB_ID}"

      - name: 18 Upload private YouTube Short
        if: ${{ inputs.execution_mode == 'real' && inputs.publish_youtube }}
        working-directory: code
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python -m fashionbot.publish "${FASHIONBOT_JOB_ID}"

      - name: 19 Push job folder after publish layer
        if: ${{ always() && inputs.execution_mode == 'real' && (inputs.generate_metadata || inputs.publish_youtube) }}
        run: |
          if [ -d "jobs/${FASHIONBOT_JOB_ID}" ]; then
            rclone copy "jobs/${FASHIONBOT_JOB_ID}" "${FASHIONBOT_REMOTE_ROOT}/jobs/${FASHIONBOT_JOB_ID}" --progress --exclude .DS_Store --exclude **/.DS_Store --exclude outputs/normalized/**
          else
            echo "No local job folder found to push"
          fi

      - name: 20 Show local job status
        if: always()
        run: |
          if [ -f "jobs/${FASHIONBOT_JOB_ID}/status.json" ]; then
            cat "jobs/${FASHIONBOT_JOB_ID}/status.json"
          else
            echo "No local status.json found"
          fi

      - name: 21 Show local output tree
        if: always()
        run: |
          if [ -d "jobs/${FASHIONBOT_JOB_ID}" ]; then
            find "jobs/${FASHIONBOT_JOB_ID}" -maxdepth 4 -type f | sort
          else
            echo "No local job folder found"
          fi

      - name: 22 Show remote job tree after run
        if: always()
        run: |
          rclone lsf "${FASHIONBOT_REMOTE_ROOT}/jobs/${FASHIONBOT_JOB_ID}" --max-depth 4

      - name: 23 Write GitHub summary
        if: always()
        run: |
          {
            echo "## Fashionbot Run"
            echo ""
            echo "- Job id: \`${FASHIONBOT_JOB_ID}\`"
            echo "- Remote root: \`${FASHIONBOT_REMOTE_ROOT}\`"
            echo "- Execution mode: \`${FASHIONBOT_EXECUTION_MODE}\`"
            echo "- Generate metadata: \`${FASHIONBOT_GENERATE_METADATA}\`"
            echo "- Publish YouTube: \`${FASHIONBOT_PUBLISH_YOUTUBE}\`"
            echo ""
            echo "### Local Status"
            echo ""
            if [ -f "jobs/${FASHIONBOT_JOB_ID}/status.json" ]; then
              echo '```json'
              cat "jobs/${FASHIONBOT_JOB_ID}/status.json"
              echo '```'
            else
              echo "No local status file was created."
            fi
            echo ""
            echo "### Expected Drive Folder"
            echo ""
            echo "\`${FASHIONBOT_REMOTE_ROOT}/jobs/${FASHIONBOT_JOB_ID}\`"
            echo ""
            echo "### YouTube"
            echo ""
            if [ -f "jobs/${FASHIONBOT_JOB_ID}/outputs/youtube_upload.json" ]; then
              echo '```json'
              cat "jobs/${FASHIONBOT_JOB_ID}/outputs/youtube_upload.json"
              echo '```'
            else
              echo "No YouTube upload result."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: 24 Upload GitHub artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fashionbot-job-${{ inputs.job_id }}
          path: jobs/${{ inputs.job_id }}/
          if-no-files-found: warn
          retention-days: 7
